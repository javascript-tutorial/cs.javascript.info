<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="posuvník" class="posuvník">
    <div class="šoupátko"></div>
  </div>

  <script>
    let šoupátko = posuvník.querySelector('.šoupátko');

    šoupátko.onmousedown = function(událost) {
      událost.preventDefault(); // prevent selection start (browser action)

      let posunX = událost.clientX - šoupátko.getBoundingClientRect().left;
      // posunY není nutný, šoupátko se pohybuje jen vodorovně

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);

      function onMouseMove(událost) {
        let nováLevá = událost.clientX - posunX - posuvník.getBoundingClientRect().left;

        // ukazatel je mimo posuvník => zamkneme šoupátko uvnitř jeho hranic
        if (nováLevá < 0) {
          nováLevá = 0;
        }
        let pravýOkraj = posuvník.offsetWidth - šoupátko.offsetWidth;
        if (nováLevá > pravýOkraj) {
          nováLevá = pravýOkraj;
        }

        šoupátko.style.left = nováLevá + 'px';
      }

      function onMouseUp() {
        document.removeEventListener('mouseup', onMouseUp);
        document.removeEventListener('mousemove', onMouseMove);
      }

    };

    šoupátko.ondragstart = function() {
      return false;
    };

  </script>

</body>
</html>
