<!DOCTYPE html>
<link rel="stylesheet" href="style.css">

<div id="posuvník" class="posuvník">
  <div class="šoupátko"></div>
</div>

<p style="border:1px solid gray" onmousemove="this.textContent = new Date()">Když sem najedete myší, uvidíte datum</p>

<script>
  let šoupátko = posuvník.querySelector('.šoupátko');
  let posunX;

  function uchopeníŠoupátka(událost) {
    událost.preventDefault(); // zabrání zahájení označování (akce prohlížeče)

    posunX = událost.clientX - šoupátko.getBoundingClientRect().left;

    šoupátko.setPointerCapture(událost.pointerId);

    šoupátko.onpointermove = přesunŠoupátka;

    šoupátko.onpointerup = událost => {
      // přetahování skončilo, dál už není nutné ukazatel sledovat
      // ...a všechna ostatní logika „konce přetahování“ přijde sem...
      šoupátko.onpointermove = null;
      šoupátko.onpointerup = null;
    }
  };

  function přesunŠoupátka(událost) {
    let nováLevá = událost.clientX - posunX - posuvník.getBoundingClientRect().left;

    // je-li ukazatel mimo posuvník => zarovnáme doleva, abychom byli uvnitř ohraničení
    if (nováLevá < 0) {
      nováLevá = 0;
    }
    let pravýOkraj = posuvník.offsetWidth - šoupátko.offsetWidth;
    if (nováLevá > pravýOkraj) {
      nováLevá = pravýOkraj;
    }

    šoupátko.style.left = nováLevá + 'px';
  };

  šoupátko.onpointerdown = uchopeníŠoupátka;

  šoupátko.ondragstart = () => false;

</script>
