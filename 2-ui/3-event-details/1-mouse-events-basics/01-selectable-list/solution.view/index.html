<!DOCTYPE HTML>
<html>

<head>
  <meta charset="utf-8">
  <style>
    .vybrán {
      background: #0f0;
    }

    li {
      cursor: pointer;
    }
  </style>
</head>

<body>

  Kliknutím na položku v seznamu ji vyberete.
  <br>

  <ul id="ul">
    <li>Kryštůfek Robin</li>
    <li>Medvídek Pú</li>
    <li>Tygr</li>
    <li>Kanga</li>
    <li>Králík. Obyčejný králík.</li>
  </ul>

  <script>
    ul.onclick = function(událost) {
      if (událost.target.tagName != "LI") return;

      if (událost.ctrlKey || událost.metaKey) {
        přepniVýběr(událost.target);
      } else {
        vyberPouze(událost.target);
      }

    }

    // zákaz nežádoucího označení elementů seznamu při kliknutí
    ul.onmousedown = function() {
      return false;
    };

    function přepniVýběr(li) {
      li.classList.toggle('vybrán');
    }

    function vyberPouze(li) {
      let vybrán = ul.querySelectorAll('.vybrán');
      for(let elem of vybrán) {
        elem.classList.remove('vybrán');
      }
      li.classList.add('vybrán');
    }

  </script>

</body>
</html>
