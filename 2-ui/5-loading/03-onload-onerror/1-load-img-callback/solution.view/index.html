<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>

  <script>
    function načtiObrázkyPředem(zdroje, callback) {
      let čítač = 0;

      function poNačtení() {
        čítač++;
        if (čítač == zdroje.length) callback();
      }

      for(let zdroj of zdroje) {
        let obrázek = document.createElement('img');
        obrázek.onload = obrázek.onerror = poNačtení;
        obrázek.src = zdroj;
      }
    }

    // ---------- Test ----------

    let zdroje = [
      "https://en.js.cx/images-load/1.jpg",
      "https://en.js.cx/images-load/2.jpg",
      "https://en.js.cx/images-load/3.jpg"
    ];

    // přidáme náhodné znaky, abychom zabránili prohlížeči v cachování
    for (let i = 0; i < zdroje.length; i++) {
      zdroje[i] += '?' + Math.random();
    }

    // pro každý obrázek
    // vytvoříme další img se stejným src a okamžitě zkontrolujeme, zda máme jeho šířku
    function testNačtení() {
      let součetŠířek = 0;
      for (let i = 0; i < zdroje.length; i++) {
        let obrázek = document.createElement('img');
        obrázek.src = zdroje[i];
        součetŠířek += obrázek.width;
      }
      alert(součetŠířek);
    }

    // měla by vypsat 300
    načtiObrázkyPředem(zdroje, testNačtení);
  </script>

</body>
</html>
