  <script>
    // označíme obrázky, abychom je mohli vizuálně stopovat, slouží jen pro usnadnění,
    // tento kód může být odstraněn
    let i = 1;
    for(let li of kolotoč.querySelectorAll('li')) {
      li.style.position = 'relative';
      li.insertAdjacentHTML('beforeend', `<span style="position:absolute;left:0;top:0">${i}</span>`);
      i++;
    }

    // ...váš kód k oživení kolotoče!
  </script>
