<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="kolotoč" class="kolotoč">
    <button class="šipka předchozí">⇦</button>
    <div class="galerie">
      <ul>
        <li><img src="https://en.js.cx/carousel/1.png"></li>
        <li><img src="https://en.js.cx/carousel/2.png"></li>
        <li><img src="https://en.js.cx/carousel/3.png"></li>
        <li><img src="https://en.js.cx/carousel/4.png"></li>
        <li><img src="https://en.js.cx/carousel/5.png"></li>
        <li><img src="https://en.js.cx/carousel/6.png"></li>
        <li><img src="https://en.js.cx/carousel/7.png"></li>
        <li><img src="https://en.js.cx/carousel/8.png"></li>
        <li><img src="https://en.js.cx/carousel/9.png"></li>
        <li><img src="https://en.js.cx/carousel/10.png"></li>
      </ul>
    </div>
    <button class="šipka další">⇨</button>
  </div>

  <script>
    /* dáme obrázkům popisky, jen pro usnadnění, abychom je mohli stopovat */
    let i = 1;
    for(let li of kolotoč.querySelectorAll('li')) {
      li.style.pozice = 'relative';
      li.insertAdjacentHTML('beforeend', `<span style="pozice:absolute;left:0;top:0">${i}</span>`);
      i++;
    }

    /* konfigurace */
    let šířka = 130; // šířka obrázku
    let počet = 3; // počet viditelných obrázků

    let seznam = kolotoč.querySelector('ul');
    let seznamPrvků = kolotoč.querySelectorAll('li');

    let pozice = 0; // pozice rolování pásu

    kolotoč.querySelector('.předchozí').onclick = function() {
      // posun doleva
      pozice += šířka * počet;
      // nemůžeme se posunovat příliš doleva, konec obrázků
      pozice = Math.min(pozice, 0)
      seznam.style.marginLeft = pozice + 'px';
    };

    kolotoč.querySelector('.další').onclick = function() {
      // posun doprava
      pozice -= šířka * počet;
      // můžeme posunout pás jen o (celková délka pásu - viditelný počet) obrázků
      pozice = Math.max(pozice, -šířka * (seznamPrvků.length - počet));
      seznam.style.marginLeft = pozice + 'px';
    };
  </script>

</body>
</html>
