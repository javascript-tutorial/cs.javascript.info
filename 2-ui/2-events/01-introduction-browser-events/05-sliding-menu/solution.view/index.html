<!DOCTYPE HTML>
<html>

<head>
  <meta charset="utf-8">
  <style>
    .menu ul {
      margin: 0;
      list-style: none;
      padding-left: 20px;
      display: none;
    }

    .menu .titulek {
      font-size: 18px;
      cursor: pointer;
    }

    .menu .titulek::before {
      content: '▶ ';
      font-size: 80%;
      color: green;
    }

    .menu.otevřeno .titulek::before {
      content: '▼ ';
    }

    .menu.otevřeno ul {
      display: block;
    }
  </style>
</head>

<body>

  <div id="sladkosti" class="menu">
    <span class="titulek">Sladkosti (klikni na mě)!</span>
    <ul>
      <li>Koláč</li>
      <li>Kobliha</li>
      <li>Med</li>
    </ul>

  </div>

  <script>
    let menuElem = document.getElementById('sladkosti');
    let titulekElem = menuElem.querySelector('.titulek');

    titulekElem.onclick = function() {
      menuElem.classList.toggle('otevřeno');
    };
  </script>

</body>
</html>
