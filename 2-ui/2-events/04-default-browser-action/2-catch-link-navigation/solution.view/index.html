<!DOCTYPE HTML>
<html>

<head>
  <meta charset="utf-8">
  <style>
    #obsah {
      padding: 5px;
      border: 1px green solid;
    }
  </style>
</head>

<body>

  <fieldset id="obsah">
    <legend>#obsah</legend>
    <p>
      Což takhle si přečíst <a href="https://cs.wikipedia.org">Wikipedii</a> nebo navštívit <a href="https://w3.org"><i>W3.org</i></a> a dozvědět se něco o moderních standardech?
    </p>
  </fieldset>

  <script>
    obsah.onclick = function(událost) {

      function zpracujOdkaz(href) {
        let odejít = confirm(`Odejít na ${href}?`);
        if (!odejít) return false;
      }

      let cíl = událost.target.closest('a');

      if (cíl && obsah.contains(cíl)) {
        return zpracujOdkaz(cíl.getAttribute('href'));
      }
    };
  </script>
  
</body>
</html>
