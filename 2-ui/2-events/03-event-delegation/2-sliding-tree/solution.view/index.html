<!DOCTYPE HTML>
<html>

<head>
  <style>
    .strom span:hover {
      font-weight: bold;
    }

    .strom span {
      cursor: pointer;
    }
  </style>
  <meta charset="utf-8">
</head>

<body>

  <ul class="strom" id="strom">
    <li>Zvířata
      <ul>
        <li>Savci
          <ul>
            <li>Dobytek</li>
            <li>Osli</li>
            <li>Psi</li>
            <li>Tygři</li>
          </ul>
        </li>
        <li>Jiná
          <ul>
            <li>Hadi</li>
            <li>Ptáci</li>
            <li>Ještěrky</li>
          </ul>
        </li>
      </ul>
    </li>
    <li>Ryby
      <ul>
        <li>Akvarijní
          <ul>
            <li>Paví očko</li>
            <li>Skalára</li>
          </ul>
        </li>
        <li>Mořské
          <ul>
            <li>Mořský pstruh</li>
          </ul>
        </li>
      </ul>
    </li>
  </ul>

  <script>
    // přesuneme všechen text do <span>,
    // pak bude zabírat přesně místo nezbytné pro text
    for (let li of strom.querySelectorAll('li')) {
      let span = document.createElement('span');
      li.prepend(span);
      span.append(span.nextSibling); // přesune textový uzel do spanu
    }

    // zachytíme kliknutí na celý strom
    strom.onclick = function(událost) {

      if (událost.target.tagName != 'SPAN') {
        return;
      }

      let dětskýKontejner = událost.target.parentNode.querySelector('ul');
      if (!dětskýKontejner) return; // nemá děti

      dětskýKontejner.hidden = !dětskýKontejner.hidden;
    }
  </script>

</body>
</html>
