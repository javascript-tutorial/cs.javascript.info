<!DOCTYPE HTML>
<html>

<head>
  <meta charset="utf-8">
  <style>
    table {
       border-collapse: collapse;
     }
     th, td {
       border: 1px solid black;
       padding: 4px;
     }
     th {
       cursor: pointer;
     }
     th:hover {
       background: yellow;
     }
  </style>
</head>

<body>

  <table id="grid">
    <thead>
      <tr>
        <th data-type="number">Věk</th>
        <th data-type="string">Jméno</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>5</td>
        <td>Jan</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Petr</td>
      </tr>
      <tr>
        <td>12</td>
        <td>Anna</td>
      </tr>
      <tr>
        <td>9</td>
        <td>Evžen</td>
      </tr>
      <tr>
        <td>1</td>
        <td>Ilja</td>
      </tr>
    </tbody>
  </table>

  <script>

    grid.onclick = function(e) {
      if (e.target.tagName != 'TH') return;

      let th = e.target;
      // pokud je to TH, provedeme řazení
      // cellIndex je číslo th:
      //   0 první sloupec
      //   1 druhý sloupec, atd.
      seřaďGrid(th.cellIndex, th.dataset.type);
    };

    function seřaďGrid(čísloSloupce, typ) {
      let tbody = grid.querySelector('tbody');

      let poleŘádků = Array.from(tbody.rows);

      // porovnej(a, b) porovná dva řádky, je nutné pro řazení
      let porovnej;

      switch (typ) {
        case 'number':
          porovnej = function(řádekA, řádekB) {
            return řádekA.cells[čísloSloupce].innerHTML - řádekB.cells[čísloSloupce].innerHTML;
          };
          break;
        case 'string':
          porovnej = function(řádekA, řádekB) {
            return řádekA.cells[čísloSloupce].innerHTML > řádekB.cells[čísloSloupce].innerHTML ? 1 : -1;
          };
          break;
      }

      // řazení
      poleŘádků.sort(porovnej);

      tbody.append(...poleŘádků);
    }
  </script>

</body>
</html>
