<!DOCTYPE HTML>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      height: 2000px;
      /* aby tělo bylo rolovatelné, tooltip by měl fungovat i po rolování */
    }

    .tooltip {
      position: fixed;
      padding: 10px 20px;
      border: 1px solid #b3c9ce;
      border-radius: 4px;
      text-align: center;
      font: italic 14px/1.3 sans-serif;
      color: #333;
      background: #fff;
      box-shadow: 3px 3px 3px rgba(0, 0, 0, .3);
    }
  </style>
</head>

<body>

  <p>LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa</p>
  <p>LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa</p>

  <button data-tooltip="tento tooltip je delší než element">Krátké tlačítko</button>
  <button data-tooltip="HTML<br>tooltip">Další tlačítko</button>

  <p>Rolujte stránkou tak, aby se tlačítka ocitla na vrchu, a zkontrolujte, zda se tooltipy zobrazí správně.</p>


  <script>
    let tooltipElem;

    document.onmouseover = function(event) {
      let target = event.target;

      // máme-li HTML pro tooltip...
      let tooltipHtml = target.dataset.tooltip;
      if (!tooltipHtml) return;

      // ...vytvoříme element tooltipu

      tooltipElem = document.createElement('div');
      tooltipElem.className = 'tooltip';
      tooltipElem.innerHTML = tooltipHtml;
      document.body.append(tooltipElem);

      // umístíme ho nad element s tooltipem (nahoru doprostřed)
      let coords = target.getBoundingClientRect();

      let left = coords.left + (target.offsetWidth - tooltipElem.offsetWidth) / 2;
      if (left < 0) left = 0; // nepřekročíme levý okraj okna

      let top = coords.top - tooltipElem.offsetHeight - 5;
      if (top < 0) { // kdybychom překročili horní okraj okna, zobrazíme tooltip dole
        top = coords.top + target.offsetHeight + 5;
      }

      tooltipElem.style.left = left + 'px';
      tooltipElem.style.top = top + 'px';
    };

    document.onmouseout = function(e) {

      if (tooltipElem) {
        tooltipElem.remove();
        tooltipElem = null;
      }

    };
  </script>

</body>
</html>
