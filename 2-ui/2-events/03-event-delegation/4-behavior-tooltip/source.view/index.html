<!DOCTYPE HTML>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      height: 2000px;
      /* aby tělo bylo rolovatelné, tooltip by měl fungovat i po rolování */
    }

    .tooltip {
      /* některé styly pro tooltip, místo nich můžete použít vlastní */
      position: fixed;
      padding: 10px 20px;
      border: 1px solid #b3c9ce;
      border-radius: 4px;
      text-align: center;
      font: italic 14px/1.3 sans-serif;
      color: #333;
      background: #fff;
      box-shadow: 3px 3px 3px rgba(0, 0, 0, .3);
    }
  </style>
</head>

<body>

  <p>LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa</p>
  <p>LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa LaLaLa</p>

  <button data-tooltip="tento tooltip je delší než element">Krátké tlačítko</button>
  <button data-tooltip="HTML<br>tooltip">Další tlačítko</button>

  <p>Rolujte stránkou tak, aby se tlačítka ocitla na vrchu, a zkontrolujte, zda se tooltipy zobrazí správně.</p>


  <script>
    // ...váš kód...
  </script>

</body>
</html>
