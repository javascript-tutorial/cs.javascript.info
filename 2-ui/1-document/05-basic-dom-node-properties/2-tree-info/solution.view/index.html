<!DOCTYPE HTML>
<html>
<body>

  <ul>
    <li>Zvířata
      <ul>
        <li>Savci
          <ul>
            <li>Dobytek</li>
            <li>Osli</li>
            <li>Psi</li>
            <li>Tygři</li>
          </ul>
        </li>
        <li>Jiná
          <ul>
            <li>Hadi</li>
            <li>Ptáci</li>
            <li>Ještěrky</li>
          </ul>
        </li>
      </ul>
    </li>
    <li>Ryby
      <ul>
        <li>Akvarijní
          <ul>
            <li>Paví očko</li>
            <li>Skalára</li>
          </ul>
        </li>
        <li>Mořské
          <ul>
            <li>Mořský pstruh</li>
          </ul>
        </li>
      </ul>
    </li>
  </ul>

  <script>
    for (let li of document.querySelectorAll('li')) {
      // získáme titulek z textového uzlu
      let titulek = li.firstChild.data;

      titulek = titulek.trim(); // odstraníme přebytečné mezery z obou konců

      // získáme počet potomků
      let počet = li.getElementsByTagName('li').length;

      alert(titulek + ': ' + počet);
    }
  </script>

</body>
</html>
