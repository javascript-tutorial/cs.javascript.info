<!DOCTYPE HTML>
<html>

<head>
  <style>
    tabulka {
      border-collapse: collapse;
    }

    td,
    th {
      border: 1px solid black;
      padding: 3px;
      text-align: center;
    }

    th {
      font-weight: bold;
      background-color: #E6E6E6;
    }
  </style>
</head>

<body>


  <div id="kalendář"></div>

  <script>
    function vytvořKalendář(elem, rok, měsíc) {

      let měs = měsíc - 1; // měsíce v JS jsou 0..11, ne 1..12
      let d = new Date(rok, měs);

      let tabulka = '<table><tr><th>PO</th><th>ÚT</th><th>ST</th><th>ČT</th><th>PÁ</th><th>SO</th><th>NE</th></tr><tr>';

      // mezery pro první řádek
      // od pondělí do prvního dne v měsíci
      // * * * 1  2  3  4
      for (let i = 0; i < vraťDen(d); i++) {
        tabulka += '<td></td>';
      }

      // <td> s aktuálními daty
      while (d.getMonth() == měs) {
        tabulka += '<td>' + d.getDate() + '</td>';

        if (vraťDen(d) % 7 == 6) { // neděle, poslední den v týdnu - nový řádek
          tabulka += '</tr><tr>';
        }

        d.setDate(d.getDate() + 1);
      }

      // za posledním dnem v měsíci přidáme mezery do posledního řádku
      // 29 30 31 * * * *
      if (vraťDen(d) != 0) {
        for (let i = vraťDen(d); i < 7; i++) {
          tabulka += '<td></td>';
        }
      }

      // uzavřeme tabulku
      tabulka += '</tr></table>';

      elem.innerHTML = tabulka;
    }

    function vraťDen(datum) { // vrátí číslo dne od 0 (pondělí) do 6 (neděle)
      let den = datum.getDay();
      if (den == 0) den = 7; // učiníme neděli (0) posledním dnem
      return den - 1;
    }

    vytvořKalendář(kalendář, 2012, 9);
  </script>

</body>
</html>
