<!DOCTYPE HTML>
<html>
<body>

  <ul>
    <li>Zvířata
      <ul>
        <li>Savci
          <ul>
            <li>Krávy</li>
            <li>Osli</li>
            <li>Psi</li>
            <li>Tygři</li>
          </ul>
        </li>
        <li>Ostatní
          <ul>
            <li>Hadi</li>
            <li>Ptáci</li>
            <li>Ještěrky</li>
          </ul>
        </li>
      </ul>
    </li>
    <li>Ryby
      <ul>
        <li>Akvarijní
          <ul>
            <li>Paví očko</li>
            <li>Skalára</li>
          </ul>
        </li>
        <li>Mořské
          <ul>
            <li>Mořský pstruh</li>
          </ul>
        </li>
      </ul>
    </li>
  </ul>
  
  <script>
    let všechnyLi = document.getElementsByTagName('li');

    for (let li of všechnyLi) {
      // zjistíme počet všech <li> pod touto <li>
      let početPotomků = li.getElementsByTagName('li').length;
      if (!početPotomků) continue;

      // přidáme ho přímo do textového uzlu (připojíme k textu)
      li.firstChild.data += ' [' + početPotomků + ']';
    }
  </script>

</body>
</html>
