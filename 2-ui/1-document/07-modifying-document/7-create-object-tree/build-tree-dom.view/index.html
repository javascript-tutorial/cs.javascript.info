<!DOCTYPE html>
<html>
<body>

  <div id="kontejner"></div>

  <script>
    let data = {
      "Ryby": {
        "pstruh": {},
        "losos": {}
      },

      "Stromy": {
        "Velké": {
          "sekvoj": {},
          "dub": {}
        },
        "Kvetoucí": {
          "jabloň": {},
          "magnólie": {}
        }
      }
    };

    function vytvořStrom(kontejner, obj) {
      kontejner.append(vytvořDomStromu(obj));
    }

    function vytvořDomStromu(obj) {
      // pokud nejsou žádné děti, toto volání vrátí undefined
      // a <ul> se nevytvoří
      if (!Object.keys(obj).length) return;

      let ul = document.createElement('ul');

      for (let klíč in obj) {
        let li = document.createElement('li');
        li.innerHTML = klíč;

        let dětiUl = vytvořDomStromu(obj[klíč]);
        if (dětiUl) {
          li.append(dětiUl);
        }

        ul.append(li);
      }

      return ul;
    }

    let kontejner = document.getElementById('kontejner');
    vytvořStrom(kontejner, data);
  </script>

</body>
</html>
