<!DOCTYPE HTML>
<html>
<head>
  <style>
    .hod {
      color: red
    }

    .min {
      color: green
    }

    .sec {
      color: blue
    }
  </style>
</head>

<body>

  <div id="hodiny">
    <span class="hod">hh</span>:<span class="min">mm</span>:<span class="sec">ss</span>
  </div>

  <script>
    let idČasovače;
    
    function aktualizuj() {
      let hodiny = document.getElementById('hodiny');
      let datum = new Date(); // (*)

      let hod = datum.getHours();
      if (hod < 10) hod = '0' + hod;
      hodiny.children[0].innerHTML = hod;

      let minuty = datum.getMinutes();
      if (minuty < 10) minuty = '0' + minuty;
      hodiny.children[1].innerHTML = minuty;

      let sekundy = datum.getSeconds();
      if (sekundy < 10) sekundy = '0' + sekundy;
      hodiny.children[2].innerHTML = sekundy;
    }

    function spusťHodiny() {
      // nastaví nový interval, jen pokud jsou hodiny zastaveny
      // jinak bychom přepsali odkaz na idČasovače běžícího intervalu a nemohli bychom hodiny už nikdy zastavit
      if (!idČasovače) {
        idČasovače = setInterval(aktualizuj, 1000);
      }
      aktualizuj(); // <-- začneme právě teď a nebudeme čekat 1 sekundu, než se spustí první setInterval
    }

    function zastavHodiny() {
      clearInterval(idČasovače);
      idČasovače = null; // <-- smažeme idČasovače, abychom si poznamenali, že hodiny byly zastaveny a mohou se ve funkci spusťHodiny() znovu spustit
    }

  </script>

  <!-- kliknutí na toto tlačítko vyvolá spusťHodiny() -->
  <input type="button" onclick="spusťHodiny()" value="Start">

  <!-- kliknutí na toto tlačítko vyvolá zastavHodiny() -->
  <input type="button" onclick="zastavHodiny()" value="Stop">

</body>
</html>
