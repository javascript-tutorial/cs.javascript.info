      <text
         id="Introduction"
         fill="#643B0C"
         font-family="OpenSans-Bold, Open Sans"
         font-size="16"
         font-weight="bold"><tspan
           x="178"
           y="200"
           id="tspan23">Introduction</tspan><tspan
           x="178"
           y="228"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan24">This Ecma Standard is based on several </tspan><tspan
           x="178"
           y="247"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan25">originating technologies, the most well </tspan><tspan
           x="178"
           y="266"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan26">known being JavaScript (Netscape) and </tspan><tspan
           x="178"
           y="285"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan27">JScript (Microsoft). The language was </tspan><tspan
           x="178"
           y="304"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan28">invented by Brendan Eich at Netscape and </tspan><tspan
           x="178"
           y="323"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan29">first appeared in that company’s Navigator </tspan><tspan
           x="178"
           y="342"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan30">2.0 browser. It has appeared in all </tspan><tspan
           x="178"
           y="361"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan31">subsequent browsers from Netscape and </tspan><tspan
           x="178"
           y="380"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan32">in all browsers from Microsoft starting with</tspan><tspan
           x="178"
           y="399"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan33" /></text>
