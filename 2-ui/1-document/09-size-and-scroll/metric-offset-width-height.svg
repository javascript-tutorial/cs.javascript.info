      <text
         id="Introduction"
         fill="#643B0C"
         font-family="OpenSans-Bold, Open Sans"
         font-size="16"
         font-weight="bold"><tspan
           x="79"
           y="193"
           id="tspan25">Introduction</tspan><tspan
           x="79"
           y="221"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan26">This Ecma Standard is based on several </tspan><tspan
           x="79"
           y="240"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan27">originating technologies, the most well </tspan><tspan
           x="79"
           y="259"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan28">known being JavaScript (Netscape) and </tspan><tspan
           x="79"
           y="278"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan29">JScript (Microsoft). The language was </tspan><tspan
           x="79"
           y="297"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan30">invented by Brendan Eich at Netscape and </tspan><tspan
           x="79"
           y="316"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan31">first appeared in that company’s Navigator </tspan><tspan
           x="79"
           y="335"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan32">2.0 browser. It has appeared in all </tspan><tspan
           x="79"
           y="354"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan33">subsequent browsers from Netscape and </tspan><tspan
           x="79"
           y="373"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan34">in all browsers from Microsoft starting </tspan><tspan
           x="79"
