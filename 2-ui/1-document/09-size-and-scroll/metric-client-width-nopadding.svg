         font-family="OpenSans-Bold, Open Sans"
         font-size="16"
         font-weight="bold"><tspan
           x="62"
           y="173"
           id="tspan9">Introduction</tspan><tspan
           x="62"
           y="201"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan10">This Ecma Standard is based on several </tspan><tspan
           x="62"
           y="220"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan11">originating technologies, the most well </tspan><tspan
           x="62"
           y="239"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan12">known being JavaScript (Netscape) and </tspan><tspan
           x="62"
           y="258"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan13">JScript (Microsoft). The language was </tspan><tspan
           x="62"
           y="277"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan14">invented by Brendan Eich at Netscape and </tspan><tspan
           x="62"
           y="296"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan15">first appeared in that company’s Navigator </tspan><tspan
           x="62"
           y="315"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan16">2.0 browser. It has appeared in all </tspan><tspan
           x="62"
           y="334"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan17">subsequent browsers from Netscape and </tspan><tspan
           x="62"
           y="353"
           font-family="OpenSans-Regular, Open Sans"
           font-size="14"
           font-weight="normal"
           id="tspan18">in all browsers from Microsoft starting with </tspan></text>
