<!DOCTYPE HTML>
<html>

<head>
  <link type="text/css" rel="stylesheet" href="my.css">
  <meta charset="utf-8">
</head>

<body>

  <ul>
    <li>Kliknutím na div jej můžete editovat.</li>
    <li>Po stisknutí Enter nebo po ztrátě fokusu se výsledek uloží.</li>
  </ul>

  HTML je dovolen.

  <div id="náhled" class="náhled">Text</div>

  <script>
    let oblast = null;
    let náhled = document.getElementById('náhled');

    náhled.onclick = function() {
      začniEditaci();
    };

    function začniEditaci() {
      oblast = document.createElement('textarea');
      oblast.className = 'edit';
      oblast.value = náhled.innerHTML;

      oblast.onkeydown = function(událost) {
        if (událost.key == 'Enter') {
          this.blur();
        }
      };

      oblast.onblur = function() {
        ukončiEditaci();
      };

      náhled.replaceWith(oblast);
      oblast.focus();
    }

    function ukončiEditaci() {
      náhled.innerHTML = oblast.value;
      oblast.replaceWith(náhled);
    }
  </script>

</body>
</html>
