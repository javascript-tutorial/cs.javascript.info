<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>

<body style="height:3000px">

  <h2>Klikněte na následující tlačítko</h2>

  <input type="button" value="Kliknutím zobrazíte formulář" id="tlačítko-zobrazení">


  <div id="kontejner-formuláře-dotazu">
    <form id="formulář-dotazu">
      <div id="zpráva-dotazu"></div>
      <input name="text" type="text">
      <input type="submit" value="Ok">
      <input type="button" name="storno" value="Storno">
    </form>
  </div>

  <script>
    // Zobrazí poloprůhledný DIV, který „zastíní“ stránku
    // (formulář není uvnitř něj, ale vedle něj, protože by neměl být poloprůhledný)
    function zobrazZakrytí() {
      let zakrývajícíDiv = document.createElement('div');
      zakrývajícíDiv.id = 'zakrývající-div';

      // zakážeme rolování stránky, dokud je modální formulář otevřený
      document.body.style.overflowY = 'hidden';

      document.body.append(zakrývajícíDiv);
    }

    function skryjZakrytí() {
      document.getElementById('zakrývající-div').remove();
      document.body.style.overflowY = '';
    }

    function zobrazDotaz(text, callback) {
      zobrazZakrytí();
      let formulář = document.getElementById('formulář-dotazu');
      let kontejner = document.getElementById('kontejner-formuláře-dotazu');
      document.getElementById('zpráva-dotazu').innerHTML = text;
      formulář.text.value = '';

      function dokonči(hodnota) {
        skryjZakrytí();
        kontejner.style.display = 'none';
        document.onkeydown = null;
        callback(hodnota);
      }

      formulář.onsubmit = function() {
        let hodnota = formulář.text.value;
        if (hodnota == '') return false; // ignorujeme prázdné odeslání

        dokonči(hodnota);
        return false;
      };

      formulář.storno.onclick = function() {
        dokonči(null);
      };

      document.onkeydown = function(e) {
        if (e.key == 'Escape') {
          dokonči(null);
        }
      };

      let posledníElement = formulář.elements[formulář.elements.length - 1];
      let prvníElement = formulář.elements[0];

      posledníElement.onkeydown = function(e) {
        if (e.key == 'Tab' && !e.shiftKey) {
          prvníElement.focus();
          return false;
        }
      };

      prvníElement.onkeydown = function(e) {
        if (e.key == 'Tab' && e.shiftKey) {
          posledníElement.focus();
          return false;
        }
      };

      kontejner.style.display = 'block';
      formulář.elements.text.focus();
    }

    document.getElementById('tlačítko-zobrazení').onclick = function() {
      zobrazDotaz("Zadejte něco<br>...chytrého :)", function(hodnota) {
        alert("Zadali jste: " + hodnota);
      });
    };
  </script>


</body>
</html>
